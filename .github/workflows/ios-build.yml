name: iOS Build & TestFlight

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.gitignore'
  workflow_dispatch: # Manual trigger

jobs:
  build-ios:
    runs-on: macos-14 # Apple Silicon runner with Xcode 16
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Sync Capacitor iOS
        run: npx cap sync ios

      - name: Install Apple certificate & provisioning profile
        env:
          P12_BASE64: ${{ secrets.IOS_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
          PP_BASE64: ${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}
        run: |
          CERT=$RUNNER_TEMP/cert.p12
          PP=$RUNNER_TEMP/profile.mobileprovision
          KEYCHAIN=$RUNNER_TEMP/signing.keychain-db
          KC_PASS=$(openssl rand -hex 12)

          # Decode secrets
          echo -n "$P12_BASE64" | base64 --decode -o $CERT
          echo -n "$PP_BASE64" | base64 --decode -o $PP

          # Create temporary keychain
          security create-keychain -p "$KC_PASS" $KEYCHAIN
          security set-keychain-settings -lut 21600 $KEYCHAIN
          security unlock-keychain -p "$KC_PASS" $KEYCHAIN

          # Import certificate
          security import $CERT -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN
          security set-key-partition-list -S apple-tool:,apple: -k "$KC_PASS" $KEYCHAIN
          security list-keychain -d user -s $KEYCHAIN

          # Install provisioning profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Build archive
        run: |
          xcodebuild archive \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -archivePath $RUNNER_TEMP/App.xcarchive \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}"

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/App.xcarchive \
            -exportOptionsPlist ios/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/output

      - name: Upload to TestFlight
        env:
          API_KEY_BASE64: ${{ secrets.APPSTORE_API_KEY_BASE64 }}
          API_KEY_ID: ${{ secrets.APPSTORE_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
        run: |
          mkdir -p ~/private_keys
          echo -n "$API_KEY_BASE64" | base64 --decode \
            > ~/private_keys/AuthKey_${API_KEY_ID}.p8

          xcrun altool --upload-app \
            -f $RUNNER_TEMP/output/App.ipa \
            -t ios \
            --apiKey $API_KEY_ID \
            --apiIssuer $API_ISSUER_ID

      - name: Clean up keychain
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/signing.keychain-db 2>/dev/null || true
