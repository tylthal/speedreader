name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.gitignore'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: TypeScript check
        run: tsc -b --noEmit

      - name: Lint
        run: npm run lint -- --max-warnings 100

      - name: Format check
        run: npm run format:check

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Check bundle size
        run: |
          # Fail if main JS bundle exceeds 600KB (gzipped ~180KB)
          MAIN_SIZE=$(stat -c%s dist/assets/index-*.js 2>/dev/null || echo 0)
          MAIN_KB=$((MAIN_SIZE / 1024))
          echo "Main bundle: ${MAIN_KB}KB"
          if [ "$MAIN_KB" -gt 600 ]; then
            echo "::error::Main bundle is ${MAIN_KB}KB, exceeds 600KB limit"
            exit 1
          fi
          # Report total bundle size
          TOTAL=$(find dist/assets -name '*.js' -exec stat -c%s {} + | awk '{s+=$1}END{print s}')
          echo "Total JS: $((TOTAL / 1024))KB"

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
